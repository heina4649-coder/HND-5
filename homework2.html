<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Student Marks</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Mark</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Steve Jones</td>
            <td>54</td>
            <td>C</td>
        </tr>
        <tr>
            <td>Kim Jenkins</td>
            <td>88</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Arthur Roberts</td>
            <td>61</td>
            <td>B</td>
        </tr>
    </table>

</body>
</html>
